<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TODO-WEB-LIST</title>
    <link rel="stylesheet" type="text/css" href="style.css" />
  </head>
  
  <body>
    <div class="glowny-kontener">
        <header>
            <h1><a href="index.html" >TODO-WEB-LIST</a></h1>
        </header>
        <nav>
            <div class="wyszukaj-kontener">
                <input type="text" id="search-input" placeholder="Wyszukaj zadanie...">
                <div class="case-sensitive">
                    <input type="checkbox" id="case-insensitive" checked>
                    <label for="case-insensitive">Wielkość liter?</label>
                </div>
            </div>
            <div class="dodaj-notatke-kontener">
                <input type="text" placeholder="Wpisz nową notatkę..." name="new-note" id="new-note"/>
                <select id="wybor-listy"></select>
                <button for="new-note" type="button" name="new-note-button" id="new-note-button" class="nav-button">Dodaj notatkę</button>
            </div>

            <div class="dodaj-liste-kontener">
                <input type="text" placeholder="Wpisz nazwę nowej listy..." name="new-list" id="new-list"/>
                <button for="new-list" type="button" name="new-list-button" id="new-list-button" class="nav-button">Dodaj listę</button>
            </div>
            <button id="cofnij-button" disabled>Cofnij usunięcie</button>
        </nav> 
        <main class="wszystkie-listy" id="wszystkie-listy"> 
        </main>
    </div>

    <div id="delete-modal" class="modal">
        <div class="modal-content">
            <p id="modal-text"></p>
            <button id="confirm-delete">Tak, usuń</button>
            <button id="cancel-delete">Nie usuwaj</button>
        </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
